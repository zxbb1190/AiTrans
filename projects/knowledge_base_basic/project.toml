# Config 主层唯一入口。
# Framework markdown 先定义结构空间；本文件只把空间具体化成：
# 1. communication：面向人与 AI 的结构化沟通要求
# 2. exact：面向 Code 层的精确参数与路径
#
# Code 层只允许读取 [exact]。
# Evidence 层只允许读取 Code export 与 canonical JSON。

[project]
project_id = "knowledge_base_basic"
runtime_scene = "knowledge_chat"
display_name = "Shelf AI Knowledge Chat"
description = "A ChatGPT-style knowledge chat client rebuilt on the Framework -> Config -> Code -> Evidence architecture."
version = "0.5.0"

[framework]
# 当前项目按严格一对一边界映射运行：
# 每个 framework 边界项必须映射到唯一 static config 路径（exact/communication 主路径），
# 并在代码层由 BoundarySpecClass + BoundaryRuntimeClass 双 class 承接。

[[framework.modules]]
role = "frontend"
framework_file = "framework/frontend/L2-M0-前端框架标准模块.md"

[[framework.modules]]
role = "knowledge_base"
framework_file = "framework/knowledge_base/L2-M0-知识库工作台场景模块.md"

[[framework.modules]]
role = "backend"
framework_file = "framework/backend/L2-M0-知识库接口框架标准模块.md"

[communication.frontend.surface]
product_shape = "conversation_sidebar_shell"
interaction_mode = "chat_first"
secondary_pages = ["knowledge_list", "knowledge_detail", "document_detail"]

[communication.frontend.visual]
brand_direction = "light precise traceable"
accent_strategy = "single controlled accent"

[communication.frontend.interact]
action_policy = "conversation and citation actions stay explicit"
allow_mutation = ["create_document", "delete_document"]

[communication.frontend.state]
state_model = "loading empty error success"
conversation_grouping = "relative_time"

[communication.frontend.extend]
slot_policy = "domain_workbench and backend_contract only"
return_targets = ["citation_drawer", "document_detail"]

[communication.frontend.route]
route_shape = "chat_home plus secondary knowledge pages"
deep_link_support = ["document", "section", "citation"]

[communication.frontend.a11y]
keyboard_first = true
announcement_focus = "knowledge chat and citation drawer"

[communication.knowledge_base.library]
knowledge_scope = "single curated workspace library"
mutation_policy = ["create", "delete"]

[communication.knowledge_base.preview]
preview_style = "drawer first"
context_expectation = "section anchored"

[communication.knowledge_base.chat]
citation_mode = "inline_refs"
answer_shape = "source_first concise structure"

[communication.knowledge_base.context]
context_loop = "knowledge_base -> conversation -> citation -> document"
sticky_policy = "non_sticky_document"

[communication.knowledge_base.return]
return_targets = ["citation_drawer", "document_detail"]
anchor_restore = true

[communication.backend.result]
result_shape = "uniform envelopes and citation-ready answers"
transport = "http_json"

[communication.backend.auth]
write_policy = "explicit allow_create allow_delete"
scope = "knowledge library mutation only"

[communication.backend.trace]
trace_depth = "query citation section document"
selection_mode = "knowledge_base_default"


# Implementation Config 只回答一件事：
# 在不改写 product_spec.toml 已经确定的产品真相前提下，
# 这个仓库准备如何把“桌面截图翻译工具”落到一条具体实现路径上。
# 它可以选择桌面宿主、采集链、Provider 链和发布方式，
# 但不能反过来改变用户入口、平台承诺、结果面板交互或产品时延目标。
#
# 当前文件同样作为人与 AI 讨论实现细化的入口，所以注释优先说明：
# 1. 当前 section 细化的是哪类实现决定；
# 2. 它如何服务既定产品真相；
# 3. 哪些决定明确不该由这里冒充成“产品真相”。
#
# 当前阶段说明：
# 这个实现配置面向“Windows MVP 优先”落地。
# 这不是在改写产品层“最终支持 Windows / macOS”的真相，
# 而是在同一产品真相下先选择一条 Windows 优先的实现与验证路径。

# [desktop_runtime] 细化桌面宿主实现路径。
# 它决定运行时和桥接方式，不改写产品层已经承诺的托盘/快捷键/悬浮面板体验。
# 当前 Windows 路径补充：
# - `focus_restore = true` 在本实现中定义为“最佳努力恢复截图前前台窗口”
# - 进入截图 overlay 前，需要先记录当前前台窗口是否属于外部应用
# - 截图提交或取消后，应优先把焦点还给截图前的外部应用，而不是强制把结果面板置前抢焦点
# - 结果面板在存在外部前台恢复目标时，应以“可见但不抢焦点”的方式出现
# - 若截图由应用内按钮再次触发，且截图前焦点本来就在 AiTrans 内部，则允许结果面板继续正常获取焦点
[desktop_runtime]
host = "electron"
shell_profile = "electron_windows_tray_overlay_v1"
preload_bridge = "context_isolated_ipc"
window_state_store = "local_json"

# [capture_runtime] 细化截图采集链。
# 它决定屏幕帧获取、位图中转和坐标补偿实现，不改变产品层截图模式和交互真相。
# 当前 Windows 路径补充：
# - 截图前必须先隐藏首次配置窗与结果面板，避免它们残留在合成层里污染首帧截图
# - 截图触发后需要留出短暂的合成稳定时间，再读取 desktopCapturer 位图
# - 首次配置完成后的第一次截图必须直接可用，不能要求用户“再截一次才恢复”
# - `fullscreen` 模式在当前 Electron 实现中由 overlay 直接承接：
#   - `Enter` 触发当前显示器整屏截图
#   - 双击 overlay 触发当前显示器整屏截图
# - 若全局快捷键注册失败，产品应自动降级为“托盘仍可用、快捷键暂不可用”，并引导用户在设置界面重绑快捷键
# - 若屏幕采集能力不可用，产品不应直接进入失败态，而应打开引导界面说明当前缺失能力与可继续使用的入口
[capture_runtime]
frame_source = "desktop_capturer"
bitmap_pipeline = "native_image_png"
coordinate_profile = "windows_per_monitor_dpi_compensation"

# [providers] 细化 OCR / 翻译提供方与密钥来源。
# 这里负责“怎么实现 provider 切换与 secrets 接入”，
# 不负责决定用户最终看到哪些字段和交互动作。
# 当前说明：
# - 正式发布路径默认把 OCR 运行时依赖随应用一起分发，不把“用户手工安装 tesseract”作为标准交付方式
# - 当前开发联调阶段仍允许通过环境变量覆盖 OCR 可执行路径，避免在 bundling 尚未落地前阻塞主链
# - `windows_ocr_api` 仍保留为后续 packaged / package-identity 形态下的升级入口
# - bundled OCR runtime 必须是“可执行整体”而不是只有 `tesseract.exe`
#   也就是说，发布目录中必须同时携带：
#   - `tesseract.exe`
#   - 同目录运行所需 `*.dll`
#   - `tessdata/eng.traineddata`
#   - `tessdata/chi_sim.traineddata`
#   - `tessdata/jpn.traineddata`
#   - `tessdata/osd.traineddata`
# - 对 `tesseract returned empty OCR text` 这类首帧空识别，需要在实现层作为可恢复场景处理，而不是直接暴露给用户
# - 翻译侧仍只保留 `openai_translation` 这一提供方面，但它指向“OpenAI 兼容端点”而不是只绑定 OpenAI 官方
# - 当前默认本地模型选择为 `qwen3-30b-a3b-instruct-2507`，以适配局域网部署的兼容端点
# - `source_language` 当前采用“provider 自动能力优先，OCR 后启发式兜底”的方式补齐结果契约
# - secret 配置的用户主路径应是“首次配置窗口 / 设置界面”，而不是要求用户手工编辑 JSON
# - 运行时覆盖文件可以继续作为内部持久化和高级排障出口，但不应作为普通用户主交互
[providers]
ocr_chain = ["tesseract", "windows_ocr_api"]
ocr_distribution = "bundle_with_app"
ocr_dev_fallback = "allow_env_binary_path"
translation_chain = ["openai_translation", "fallback_stub"]
translation_api = "openai_compatible"
translation_model = "qwen3-30b-a3b-instruct-2507"
translation_endpoint_profile = "openai_compatible"
translation_endpoint_source = "env_or_local_gateway"
source_language_detection = "provider_auto_or_heuristic_fallback"
secret_source = "setup_ui_managed_runtime_store_or_env"

# [presentation_runtime] 细化结果面板与系统剪贴板实现。
# 它决定浮层渲染方案，不改变产品层动作集合和面板语义。
# 当前约定是：
# - overlay 截图遮罩继续使用原生 HTML/JS，保持轻量
# - panel 结果面板使用 `Vue 3 + Vite + .vue SFC`，承接后续更复杂的状态与交互
[presentation_runtime]
renderer = "floating_panel_vue_vite_v1"
ui_framework = "vue3"
overlay_profile = "frameless_transparent_always_on_top"
clipboard_bridge = "native_clipboard"

# [release] 细化打包与更新路径。
# 它决定发布产物和自动更新策略，但不能更改产品层兼容矩阵与更新通道的语义。
# 当前 Windows 路径补充：
# - 安装产物使用 `NSIS`
# - Windows 安装器默认走 `per-user` 路径，不应要求管理员权限
# - 安装器必须关闭默认提权依赖，不能把“必须管理员运行安装器”当成正常用户路径
# - OCR 运行时与项目生成产物会在打包时一并进入安装包资源目录
# - 翻译端点凭据不应硬编码进安装包，优先通过运行时覆盖文件或环境变量提供
# - 首次启动应自动生成运行时覆盖文件模板，并在翻译端点缺失时自动打开配置引导
[release]
targets = ["win-x64", "darwin-universal"]
package_formats = ["nsis", "dmg"]
auto_update = true
channel = "stable"

# [evidence] 细化实现层证据出口。
# 这些路径用于调试、验证和自动化消费，不属于产品真相本身。
[evidence]
product_spec_endpoint = "/api/aitrans/product-spec"
runtime_bundle_endpoint = "/api/aitrans/runtime-bundle"

# [artifacts] 约定生成产物命名。
# 这些文件都应由生成器物化，不允许人工手改。
[artifacts]
framework_ir_json = "framework_ir.json"
product_spec_json = "product_spec.json"
implementation_bundle_py = "implementation_bundle.py"
generation_manifest_json = "generation_manifest.json"

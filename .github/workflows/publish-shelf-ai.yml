name: Publish Shelf AI

on:
  push:
    tags:
      - "shelf-ai-v*"
  workflow_dispatch:

jobs:
  publish-shelf-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
        working-directory: tools/vscode/shelf-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve package version
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#shelf-ai-v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}" >&2
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "vsix_run_path=releases/shelf-ai-${VERSION}.vsix" >> "${GITHUB_OUTPUT}"
          echo "vsix_repo_path=tools/vscode/shelf-ai/releases/shelf-ai-${VERSION}.vsix" >> "${GITHUB_OUTPUT}"
          echo "notes_run_path=release-notes/${VERSION}.md" >> "${GITHUB_OUTPUT}"
          echo "notes_repo_path=tools/vscode/shelf-ai/release-notes/${VERSION}.md" >> "${GITHUB_OUTPUT}"

      - name: Validate release notes
        if: github.ref_type == 'tag'
        run: |
          NOTES_PATH="${{ steps.meta.outputs.notes_run_path }}"
          if [[ ! -f "${NOTES_PATH}" ]]; then
            echo "Missing release notes: ${NOTES_PATH}" >&2
            exit 1
          fi
          grep -q '^## 中文说明' "${NOTES_PATH}" || { echo "Missing Chinese release-note section" >&2; exit 1; }
          grep -q '^## English Notes' "${NOTES_PATH}" || { echo "Missing English release-note section" >&2; exit 1; }
          awk '
            /^## 中文说明/ { in_zh=1; in_en=0; next }
            /^## English Notes/ { in_zh=0; in_en=1; next }
            /^## / { in_zh=0; in_en=0 }
            in_zh && /^- / { zh=1 }
            in_en && /^- / { en=1 }
            END {
              if (!zh) {
                print "Chinese release-note section must contain at least one bullet." > "/dev/stderr";
                exit 1;
              }
              if (!en) {
                print "English release-note section must contain at least one bullet." > "/dev/stderr";
                exit 1;
              }
            }
          ' "${NOTES_PATH}"

      - name: Package VSIX
        run: npx --yes @vscode/vsce package -o "${{ steps.meta.outputs.vsix_run_path }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelf-ai-${{ steps.meta.outputs.version }}-vsix
          path: ${{ steps.meta.outputs.vsix_repo_path }}

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Shelf AI ${{ steps.meta.outputs.version }}" \
              --notes-file "${{ steps.meta.outputs.notes_run_path }}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Shelf AI ${{ steps.meta.outputs.version }}" \
              --notes-file "${{ steps.meta.outputs.notes_run_path }}"
          fi
          gh release upload "${GITHUB_REF_NAME}" "${{ steps.meta.outputs.vsix_run_path }}" --clobber

      - name: Publish to Open VSX
        if: github.ref_type == 'tag'
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [[ -z "${OPEN_VSX_TOKEN}" ]]; then
            echo "OPEN_VSX_TOKEN not configured; skipping Open VSX publish."
            exit 0
          fi
          npx --yes ovsx publish "${{ steps.meta.outputs.vsix_run_path }}" -p "${OPEN_VSX_TOKEN}"

      - name: Publish to VS Marketplace
        if: github.ref_type == 'tag'
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          if [[ -z "${VSCE_PAT}" ]]; then
            echo "VS_MARKETPLACE_TOKEN not configured; skipping VS Marketplace publish."
            exit 0
          fi
          npx --yes @vscode/vsce publish --packagePath "${{ steps.meta.outputs.vsix_run_path }}"

name: Canonical Gate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  canonical-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv --version

      - name: Sync environment
        run: uv sync --frozen

      - name: Materialize project artifacts
        run: uv run python scripts/materialize_project.py

      - name: Validate canonical
        run: uv run python scripts/validate_canonical.py

      - name: Validate change propagation
        run: uv run python scripts/validate_canonical.py --check-changes
